<!doctype html>
<html lang="nl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Liftlog</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Liftlog">
<meta name="theme-color" content="#F4F6FB">
<link rel="manifest" href="./manifest.webmanifest">
<link rel="apple-touch-icon" href="./icon-180.png">
<link rel="icon" type="image/png" href="./icon-180.png">
</head>
<body>
<style>
:root{
  --bg:#F4F6FB; --ink:#0E1430; --ink2:rgba(14,20,48,.62); --ink3:rgba(14,20,48,.4);
  --line:rgba(14,20,48,.08); --line2:rgba(14,20,48,.15);
  --up:#15803D; --down:#C2410C;
  --blauw:#2a78d6; --aqua:#1baf7a; --aquaD:#0e7a55; --geel:#eda100;
  --grid:rgba(14,20,48,.07);
  --r:22px;
  --mono:ui-monospace,'SF Mono',SFMono-Regular,Menlo,monospace;
  --sans:-apple-system,BlinkMacSystemFont,'SF Pro Text','Segoe UI',sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html{overflow-x:hidden}
body{
  font-family:var(--sans); background:var(--bg); color:var(--ink);
  min-height:100dvh; overflow-x:hidden; line-height:1.45;
  overscroll-behavior-y:contain; touch-action:manipulation;
  -webkit-font-smoothing:antialiased;
}
#bg{position:fixed;inset:0;z-index:0;pointer-events:none;background:var(--bg)}
.blob{position:fixed;z-index:0;pointer-events:none;border-radius:50%;will-change:transform}
.blob.b1{width:64vmax;height:64vmax;left:-22vmax;top:-24vmax;background:radial-gradient(circle at 40% 40%,rgba(129,140,248,.34),transparent 62%);animation:drift1 52s ease-in-out infinite alternate}
.blob.b2{width:58vmax;height:58vmax;right:-24vmax;top:16vmax;background:radial-gradient(circle at 55% 45%,rgba(94,212,190,.30),transparent 62%);animation:drift2 64s ease-in-out infinite alternate}
.blob.b3{width:50vmax;height:50vmax;left:6vmax;bottom:-26vmax;background:radial-gradient(circle at 50% 40%,rgba(244,164,208,.26),transparent 62%);animation:drift3 74s ease-in-out infinite alternate}
@keyframes drift1{to{transform:translate(9vmax,7vmax) scale(1.12)}}
@keyframes drift2{to{transform:translate(-8vmax,10vmax) scale(1.08)}}
@keyframes drift3{to{transform:translate(7vmax,-9vmax) scale(1.15)}}
#wrap{position:relative;z-index:1;max-width:480px;margin:0 auto;padding:calc(env(safe-area-inset-top,0px) + 18px) 16px calc(env(safe-area-inset-bottom,0px) + 108px)}
#app.anim>*{animation:pop .5s cubic-bezier(.22,.9,.32,1) both}
#app.anim>*:nth-child(2){animation-delay:.04s}#app.anim>*:nth-child(3){animation-delay:.08s}
#app.anim>*:nth-child(4){animation-delay:.12s}#app.anim>*:nth-child(5){animation-delay:.16s}
#app.anim>*:nth-child(6){animation-delay:.2s}#app.anim>*:nth-child(7){animation-delay:.24s}
#app.anim>*:nth-child(n+8){animation-delay:.28s}
@keyframes pop{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}
.eyebrow{font-family:var(--mono);font-size:10px;letter-spacing:.28em;color:var(--ink3);text-transform:uppercase}
h1{font-size:30px;font-weight:800;letter-spacing:-.02em;margin:2px 0 0}
.sub{color:var(--ink2);font-size:14px;margin-top:2px}
h2{font-size:13px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--ink2);margin:26px 2px 10px}
h2 .mini{font-weight:500;text-transform:none;letter-spacing:0;color:var(--ink3);float:right;font-size:12px}
.card{background:linear-gradient(155deg,rgba(255,255,255,.86),rgba(255,255,255,.55));
  -webkit-backdrop-filter:blur(20px) saturate(170%);backdrop-filter:blur(20px) saturate(170%);
  border:1px solid rgba(255,255,255,.85);border-radius:var(--r);
  box-shadow:0 12px 32px rgba(31,41,90,.10),0 2px 6px rgba(31,41,90,.05),inset 0 1px 0 #fff;
  padding:16px;margin-bottom:12px;min-width:0}
.card.flat{box-shadow:0 4px 14px rgba(31,41,90,.07),inset 0 1px 0 #fff}
.row{display:flex;align-items:center;gap:10px;min-width:0}
.row>*{min-width:0}
.grow{flex:1 1 auto}
button{font-family:var(--sans);border:0;background:none;color:var(--ink);cursor:pointer;-webkit-user-select:none;user-select:none;font-size:15px}
button:focus-visible,input:focus-visible,select:focus-visible,textarea:focus-visible{outline:2px solid rgba(42,120,214,.7);outline-offset:2px}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:7px;padding:11px 16px;border-radius:15px;
  background:rgba(255,255,255,.7);border:1px solid rgba(14,20,48,.10);font-weight:600;font-size:14px;
  box-shadow:0 3px 10px rgba(31,41,90,.07),inset 0 1px 0 #fff;transition:transform .15s}
.btn:active{transform:scale(.97)}
.btn.acc{position:relative;overflow:hidden;background:linear-gradient(165deg,#FFFFFF,#EAEEF9);border:1px solid rgba(255,255,255,.9);color:var(--ink);font-weight:700;
  box-shadow:0 10px 26px rgba(31,41,90,.16),0 2px 6px rgba(31,41,90,.08),inset 0 1px 0 #fff}
.btn.acc::after{content:'';position:absolute;top:-40%;bottom:-40%;width:34%;left:-55%;pointer-events:none;
  background:linear-gradient(100deg,transparent,rgba(120,140,255,.35),transparent);transform:skewX(-18deg);transition:left .55s ease}
.btn.acc:active::after{left:125%}
.btn.wide{width:100%;padding:14px}
.btn.ghost{background:rgba(255,255,255,.4);border:1px dashed var(--line2);color:var(--ink2);box-shadow:none}
.btn.danger{color:#B3400E;background:rgba(234,88,12,.08);border:1px solid rgba(234,88,12,.22);box-shadow:none}
.chip{display:inline-flex;align-items:center;gap:5px;padding:3px 9px;border-radius:999px;font-size:11.5px;font-weight:600;
  background:rgba(255,255,255,.6);border:1px solid var(--line);color:var(--ink2);white-space:nowrap}
.chip.up{color:var(--up);border-color:rgba(21,128,61,.28);background:rgba(21,128,61,.09)}
.chip.down{color:var(--down);border-color:rgba(194,65,12,.26);background:rgba(194,65,12,.08)}
.chip.pr{color:#A16207;border-color:rgba(161,98,7,.32);background:rgba(250,204,21,.16)}
.chip.set{font-family:var(--mono);font-weight:500}
.chip.click{cursor:pointer}
.chip.sel{background:linear-gradient(165deg,#fff,#EAEEF9);color:var(--ink);border-color:rgba(255,255,255,.9);font-weight:700;box-shadow:0 6px 16px rgba(31,41,90,.14),inset 0 1px 0 #fff}
.mono{font-family:var(--mono)}
.dim{color:var(--ink3)} .soft{color:var(--ink2)}
.num{font-variant-numeric:tabular-nums}
/* template gradients */
.g-ant{--g1:#FF9F45;--g2:#FF5E62}.g-post{--g1:#5B8DEF;--g2:#A06BFF}
.g-legs{--g1:#2CC5B6;--g2:#3DDC97}.g-fb{--g1:#FF7AB8;--g2:#8E7CFF}
.g-white{--g1:#DFE6FA;--g2:#9FB4E8}
.gdot{width:10px;height:10px;border-radius:4px;background:linear-gradient(135deg,var(--g1),var(--g2));flex:none;box-shadow:0 1px 6px rgba(31,41,90,.25)}
/* start cards */
.tgrid{display:grid;grid-template-columns:minmax(0,1fr) minmax(0,1fr);gap:10px}
.tcard{position:relative;overflow:hidden;border-radius:var(--r);padding:15px 14px 13px;text-align:left;
  background:linear-gradient(155deg,rgba(255,255,255,.88),rgba(255,255,255,.6));
  -webkit-backdrop-filter:blur(20px) saturate(170%);backdrop-filter:blur(20px) saturate(170%);
  border:1px solid rgba(255,255,255,.85);box-shadow:0 10px 26px rgba(31,41,90,.10),inset 0 1px 0 #fff;min-width:0;transition:transform .15s}
.tcard::before{content:'';position:absolute;inset:-45% -20% auto;height:130%;
  background:radial-gradient(60% 80% at 28% 22%,var(--g1),transparent 70%),radial-gradient(50% 70% at 82% 12%,var(--g2),transparent 70%);
  opacity:.30;pointer-events:none}
.tcard:active{transform:scale(.97)}
.tcard b{font-size:16px;letter-spacing:-.01em;display:block;position:relative}
.tcard .meta{position:relative;font-size:11.5px;color:var(--ink2);margin-top:3px;display:block}
.tcard .last{position:relative;font-family:var(--mono);font-size:10px;color:var(--ink3);margin-top:9px;display:block}
/* week strip */
.week{display:flex;justify-content:space-between;gap:6px}
.wday{flex:1;display:flex;flex-direction:column;align-items:center;gap:6px;font-family:var(--mono);font-size:9.5px;color:var(--ink3);text-transform:uppercase}
.wdot{width:26px;height:26px;border-radius:10px;border:1px solid var(--line2);display:flex;align-items:center;justify-content:center;background:rgba(255,255,255,.55);color:#fff}
.wdot.on{background:linear-gradient(135deg,var(--g1,#5B8DEF),var(--g2,#8E6FF7));border:0;box-shadow:0 3px 9px rgba(31,41,90,.28)}
.wdot.cardio{border:2px solid var(--aqua);background:rgba(27,175,122,.08)}
.wdot.cardio i{width:7px;height:7px;border-radius:50%;background:var(--aqua)}
.wdot.today{box-shadow:0 0 0 2px rgba(14,20,48,.28)}
.wdot.on.today{box-shadow:0 0 0 2px rgba(14,20,48,.28),0 3px 9px rgba(31,41,90,.28)}
/* streak */
.streakcard{display:flex;align-items:center;gap:13px}
.flamewrap{width:46px;height:46px;flex:none;display:flex;align-items:center;justify-content:center;border-radius:16px;
  background:linear-gradient(160deg,rgba(255,194,77,.22),rgba(255,107,74,.14));border:1px solid rgba(255,140,66,.32);box-shadow:inset 0 1px 0 rgba(255,255,255,.6)}
.flame{transform-origin:50% 85%;animation:flick 1.9s ease-in-out infinite}
.flame.off{animation:none}
@keyframes flick{0%,100%{transform:scale(1) rotate(-2.5deg)}50%{transform:scale(1.07,1.12) rotate(2.5deg)}}
.miniwks{display:flex;gap:4px;flex:none}
.miniwks .mw{width:16px;height:16px;border-radius:6px;display:flex;align-items:center;justify-content:center;background:rgba(14,20,48,.05);border:1px solid var(--line)}
.miniwks .mw.on{background:linear-gradient(160deg,#FFC24D,#FF6B4A);border:0;box-shadow:0 2px 6px rgba(255,150,70,.4)}
.miniwks .mw.now{box-shadow:0 0 0 2px rgba(14,20,48,.28)}
/* tiles */
.tiles{display:grid;grid-template-columns:minmax(0,1fr) minmax(0,1fr);gap:10px}
.tiles.three{grid-template-columns:minmax(0,1fr) minmax(0,1fr) minmax(0,1fr)}
.tile{background:rgba(255,255,255,.5);border:1px solid rgba(255,255,255,.8);border-radius:16px;padding:11px 12px;min-width:0;box-shadow:0 2px 8px rgba(31,41,90,.05),inset 0 1px 0 #fff}
.tile .lbl{font-family:var(--mono);font-size:9.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--ink3)}
.tile .val{font-size:21px;font-weight:800;letter-spacing:-.02em;margin-top:3px;font-variant-numeric:tabular-nums;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tile .val small{font-size:12px;font-weight:600;color:var(--ink2)}
.tile .foot{font-size:11px;color:var(--ink2);margin-top:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
/* session */
.shead{position:sticky;top:0;z-index:30;margin:-6px -16px 14px;padding:calc(env(safe-area-inset-top,0px) + 10px) 16px 10px;
  background:linear-gradient(180deg,rgba(244,246,251,.94),rgba(244,246,251,.8));
  -webkit-backdrop-filter:blur(22px) saturate(170%);backdrop-filter:blur(22px) saturate(170%);
  border-bottom:1px solid var(--line)}
.iconbtn{width:38px;height:38px;border-radius:13px;background:rgba(255,255,255,.7);border:1px solid var(--line);display:flex;align-items:center;justify-content:center;flex:none;box-shadow:0 2px 8px rgba(31,41,90,.07),inset 0 1px 0 #fff}
.iconbtn:active{transform:scale(.94)}
.iconbtn.sm{width:28px;height:28px;border-radius:9px}
.exname{font-size:16.5px;font-weight:700;letter-spacing:-.01em}
.setting{font-family:var(--mono);font-size:10.5px;color:var(--ink2);background:rgba(14,20,48,.05);border:1px solid var(--line2);padding:2px 8px;border-radius:999px;white-space:nowrap}
.prevline{font-family:var(--mono);font-size:11px;color:var(--ink3);margin-top:3px}
.setrows{margin-top:10px;display:flex;flex-direction:column;gap:7px}
.setrow{display:flex;align-items:center;gap:8px;min-width:0}
.donebtn{width:26px;height:26px;border-radius:9px;border:1.5px solid var(--line2);flex:none;display:flex;align-items:center;justify-content:center;color:transparent;background:rgba(255,255,255,.5)}
.setrow.done .donebtn{background:linear-gradient(135deg,#34C377,#17A673);border-color:transparent;color:#fff;box-shadow:0 2px 8px rgba(23,166,115,.35)}
.setn{font-family:var(--mono);font-size:11px;color:var(--ink3);width:14px;text-align:center;flex:none}
input.in{background:rgba(255,255,255,.75);border:1px solid var(--line2);border-radius:11px;color:var(--ink);
  font-size:16px;font-weight:600;padding:8px 2px;text-align:center;font-variant-numeric:tabular-nums;font-family:var(--sans);width:100%;min-width:0;box-shadow:inset 0 1px 2px rgba(31,41,90,.05)}
input.in::placeholder{color:var(--ink3);font-weight:500}
.setrow .w{flex:0 1 76px}.setrow .r{flex:0 1 60px}
.pwrap{display:flex;align-items:center;gap:3px;flex:0 1 56px}
.pwrap .plbl{font-family:var(--mono);font-size:10px;color:var(--ink3)}
.pwrap input{padding:8px 0;font-size:14px}
.x{color:var(--ink3);flex:none;font-size:13px}
.cmp{width:20px;text-align:center;font-size:12px;flex:none}
.cmp.up{color:var(--up)}.cmp.down{color:var(--down)}.cmp.flat{color:var(--ink3)}
.delset{color:var(--ink3);font-size:16px;padding:4px 2px;flex:none;line-height:1}
.notearea{width:100%;margin-top:10px;background:rgba(255,255,255,.7);border:1px solid var(--line);border-radius:12px;color:var(--ink);font-family:var(--sans);font-size:14px;padding:9px 11px;resize:none;min-height:56px}
.addset{margin-top:10px;width:100%;padding:9px;border-radius:12px;border:1px dashed var(--line2);color:var(--ink2);font-size:13px;font-weight:600}
/* tabbar */
#tabbar{position:fixed;left:50%;transform:translateX(-50%);bottom:calc(env(safe-area-inset-bottom,0px) + 14px);z-index:40;
  width:min(calc(100% - 28px),452px);display:flex;border-radius:26px;padding:7px;
  background:linear-gradient(160deg,rgba(255,255,255,.82),rgba(255,255,255,.6));
  -webkit-backdrop-filter:blur(26px) saturate(180%);backdrop-filter:blur(26px) saturate(180%);
  border:1px solid rgba(255,255,255,.9);box-shadow:0 16px 40px rgba(31,41,90,.16),0 2px 8px rgba(31,41,90,.06),inset 0 1px 0 #fff}
#tabbar button{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:7px 0 5px;border-radius:19px;color:var(--ink3);font-size:9.5px;font-weight:600;letter-spacing:.04em;transition:background .25s,color .25s}
#tabbar button.on{color:var(--ink);background:rgba(255,255,255,.95);box-shadow:0 4px 12px rgba(31,41,90,.12),inset 0 1px 0 #fff}
#tabbar svg{width:21px;height:21px}
/* charts */
.chart{width:100%;display:block}
.legend{display:flex;gap:14px;margin-top:8px;flex-wrap:wrap}
.legend span{display:inline-flex;align-items:center;gap:6px;font-family:var(--mono);font-size:10px;color:var(--ink2)}
.ldot{width:8px;height:8px;border-radius:3px;flex:none}
/* anatomy */
.anat{display:flex;justify-content:space-around;gap:8px;margin-top:6px}
.anat figure{flex:1;max-width:150px;text-align:center}
.anat svg{width:100%;display:block}
.anat figcaption{font-family:var(--mono);font-size:9.5px;letter-spacing:.18em;text-transform:uppercase;color:var(--ink3);margin-top:4px}
.heatbar{height:8px;border-radius:4px;flex:1;background:linear-gradient(90deg,#cde2fb,#86b6ef,#3987e5,#1c5cab)}
.grow-bar{height:6px;border-radius:3px;background:var(--blauw);min-width:2px}
/* history */
.sesscard{display:flex;align-items:center;gap:11px;padding:13px 14px;cursor:pointer}
.sesscard:active{transform:scale(.985)}
.sesscard .t{font-weight:700;font-size:15px}
.sesscard .d{font-size:12px;color:var(--ink2);margin-top:1px}
.chiprow{display:flex;gap:6px;flex-wrap:wrap;margin-top:6px}
.cicon{width:34px;height:34px;border-radius:12px;background:rgba(27,175,122,.12);border:1px solid rgba(27,175,122,.3);display:flex;align-items:center;justify-content:center;color:var(--aquaD);flex:none}
/* modal */
#modal{position:fixed;inset:0;z-index:60;display:none}
#modal.open{display:block}
#modal .veil{position:absolute;inset:0;background:rgba(20,26,54,.32);-webkit-backdrop-filter:blur(6px);backdrop-filter:blur(6px)}
#modal .sheet{position:absolute;left:50%;transform:translateX(-50%);bottom:0;width:min(100%,500px);max-height:88dvh;overflow-y:auto;
  border-radius:26px 26px 0 0;padding:18px 18px calc(env(safe-area-inset-bottom,0px) + 22px);
  background:linear-gradient(170deg,rgba(255,255,255,.96),rgba(244,246,252,.96));
  -webkit-backdrop-filter:blur(26px) saturate(170%);backdrop-filter:blur(26px) saturate(170%);
  border:1px solid rgba(255,255,255,.95);border-bottom:0;box-shadow:0 -20px 60px rgba(31,41,90,.22);
  animation:rise .32s cubic-bezier(.2,.9,.3,1)}
@keyframes rise{from{transform:translate(-50%,26px);opacity:0}to{transform:translate(-50%,0);opacity:1}}
.grab{width:38px;height:4px;border-radius:2px;background:rgba(14,20,48,.18);margin:0 auto 14px}
.mtitle{font-size:19px;font-weight:800;letter-spacing:-.01em}
.msub{font-size:13px;color:var(--ink2);margin-top:2px}
.field{margin-top:12px}
.field label{display:block;font-family:var(--mono);font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--ink3);margin-bottom:6px}
.field input[type=text],.field input[type=date],.field select,.field textarea{width:100%;background:rgba(255,255,255,.85);border:1px solid var(--line2);
  border-radius:13px;color:var(--ink);font-size:16px;font-family:var(--sans);padding:11px 13px;-webkit-appearance:none;appearance:none;color-scheme:light}
.field textarea{font-family:var(--mono);font-size:12px;min-height:120px}
.plist{margin-top:10px;max-height:52dvh;overflow-y:auto;display:flex;flex-direction:column;gap:4px}
.pitem{display:flex;align-items:center;gap:10px;text-align:left;padding:10px 10px;border-radius:13px;border:1px solid transparent}
.pitem:active,.pitem.on{background:rgba(255,255,255,.9);border-color:var(--line);box-shadow:0 2px 8px rgba(31,41,90,.06)}
.pgroup{font-family:var(--mono);font-size:9.5px;letter-spacing:.2em;text-transform:uppercase;color:var(--ink3);margin:10px 4px 3px}
.scorebig{font-size:44px;font-weight:900;letter-spacing:-.03em;font-variant-numeric:tabular-nums}
.scorebig.up{color:var(--up)}.scorebig.down{color:var(--down)}
.srow{display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid rgba(14,20,48,.06)}
.srow:last-child{border-bottom:0}
@keyframes prpulse{0%,100%{box-shadow:0 0 0 0 rgba(250,204,21,0)}50%{box-shadow:0 0 14px 1px rgba(217,164,6,.35)}}
.chip.pr{animation:prpulse 2.2s ease-in-out infinite}
/* toast */
#toast{position:fixed;left:50%;transform:translateX(-50%) translateY(16px);bottom:calc(env(safe-area-inset-bottom,0px) + 92px);z-index:80;
  background:rgba(17,24,52,.92);color:#F5F7FF;-webkit-backdrop-filter:blur(16px);backdrop-filter:blur(16px);border:1px solid rgba(255,255,255,.14);
  padding:10px 18px;border-radius:999px;font-size:13.5px;font-weight:600;opacity:0;pointer-events:none;transition:.28s;white-space:nowrap;max-width:90vw;overflow:hidden;text-overflow:ellipsis}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
#tip{position:fixed;z-index:90;background:rgba(17,24,52,.94);border:1px solid rgba(255,255,255,.14);border-radius:11px;padding:7px 11px;
  font-family:var(--mono);font-size:11px;color:#F5F7FF;pointer-events:none;opacity:0;transition:.15s;max-width:230px;box-shadow:0 8px 24px rgba(31,41,90,.35)}
#tip.show{opacity:1}
.banner{background:rgba(234,88,12,.08);border:1px solid rgba(234,88,12,.25);border-radius:16px;padding:11px 14px;font-size:13px;color:#9A3E10;margin-bottom:12px}
.empty{text-align:center;color:var(--ink3);font-size:13.5px;padding:22px 10px}
.listrow{display:flex;align-items:center;gap:10px;padding:11px 4px;border-bottom:1px solid rgba(14,20,48,.06);cursor:pointer}
.listrow:last-child{border-bottom:0}
details.help{margin-top:12px;border:1px solid var(--line);border-radius:14px;padding:11px 13px;background:rgba(255,255,255,.5)}

function migrate(d){
 if(d.v<2){
  d.templates=(d.templates||[]).filter(t=>!['fullbody','anterior-dec','posterior-dec'].includes(t.id));
  d.templates.forEach(t=>{if(!GRADS[t.grad])t.grad=NAMEGRAD[t.name]||'post'});
  d.cardio=d.cardio||[];
  if(d.exercises&&d.exercises.adduction)d.exercises.adduction.group='Adductoren';
 }
 if(d.v<3){
  (d.templates||[]).forEach(t=>{t.exIds=t.exIds.filter(x=>x!=='inc-press-p6')});
  if(d.exercises&&!d.exercises['forearm-curl'])d.exercises['forearm-curl']={name:'Forearm Curl',setting:'',group:'Onderarmen'};
 }
 if(d.v<4){
  const rugmap={'lat-pulldown':'Lats','uni-latpd':'Lats','frontal-pd':'Lats','wide-frontal-pd':'Lats','sagittal-pd':'Lats','pull-up':'Lats','row-0':'Upper back','db-chest-row':'Upper back','cable-row':'Upper back','back-ext':'Lower back'};
  for(const id in (d.exercises||{})){
   if(rugmap[id])d.exercises[id].group=rugmap[id];
   else if(d.exercises[id].group==='Rug')d.exercises[id].group='Upper back';
  }
  if(d.exercises&&!d.exercises['shrugs'])d.exercises['shrugs']={name:'Shrugs',setting:'',group:'Traps'};
 }
 for(const id in (d.exercises||{}))if(!GROUPS.includes(d.exercises[id].group))d.exercises[id].group='Overig';
 d.cardio=d.cardio||[];
 d.v=4;
 return d;
}

const setVol=s=>(s.w>0&&s.r>0)?s.w*s.r+(s.p>0?s.w*s.p*0.5:0):0;
const entryVol=en=>en.sets.reduce((a,s)=>a+setVol(s),0);
const sessVol=ss=>ss.entries.reduce((a,e)=>a+entryVol(e),0);
function entryBest(en){let topW=null,bestSet=null,vol=0;
 for(const s of en.sets){vol+=setVol(s);
  if(s.w>0&&s.r>0&&(topW==null||s.w>topW||(s.w===topW&&bestSet&&s.r>bestSet.r))){topW=Math.max(topW||0,s.w);if(s.w>=topW)bestSet=s;}}
 return {topW,bestSet,vol:vol||null};}
function gradFor(ss){const t=db.templates.find(t=>t.id===ss.tplId);return (t&&t.grad)||NAMEGRAD[ss.name]||'post';}
function sortSessions(){db.sessions.sort((a,b)=>a.date<b.date?-1:a.date>b.date?1:(a.id<b.id?-1:1))}
function exHistory(exId,uptoIdx){
 const out=[];const lim=uptoIdx==null?db.sessions.length:uptoIdx;
 for(let i=0;i<lim;i++){const ss=db.sessions[i];
  for(const en of ss.entries)if(en.ex===exId){const b=entryBest(en);
   out.push({date:ss.date,sid:ss.id,sets:en.sets,vol:b.vol,topW:b.topW,bset:b.bestSet});break}}
 return out;}
function baseline(hist){const withV=hist.filter(h=>h.vol>0);if(!withV.length)return null;
 const last=withV.slice(-3);return last.reduce((a,h)=>a+h.vol,0)/last.length;}
function setsStr(sets){return sets.map(s=>{
 const w=s.w==null?'?':(s.w===0?'max':kg(s.w));const r=s.r==null?'?':s.r;
 return r+'×'+w+(s.p>0?' +'+s.p+'p':'');}).join(' · ')}
function sessionStats(ss,idx){
 if(idx==null)idx=db.sessions.findIndex(x=>x.id===ss.id);
 const deltas=[];let prCount=0;
 for(const en of ss.entries){const b=entryBest(en);if(!b.vol)continue;
  const hist=exHistory(en.ex,idx);const base=baseline(hist);
  const prevMaxW=hist.reduce((a,h)=>h.topW!=null?Math.max(a,h.topW):a,0);
  const prevMaxV=hist.reduce((a,h)=>h.vol?Math.max(a,h.vol):a,0);
  const pr=hist.length>0&&((b.topW!=null&&b.topW>prevMaxW+0.01)||b.vol>prevMaxV+0.01);
  if(pr)prCount++;
  deltas.push({ex:en.ex,vol:b.vol,set:b.bestSet,delta:base!=null?(b.vol-base)/base*100:null,pr});}
 const withD=deltas.filter(d=>d.delta!=null);
 const score=withD.length?withD.reduce((a,d)=>a+d.delta,0)/withD.length:null;
 return {score,deltas,prCount,vol:sessVol(ss),sets:ss.entries.reduce((a,e)=>a+e.sets.filter(s=>s.w>0&&s.r>0).length,0)};
}
function prFeed(){
 const events=[];const maxW={},maxV={};
 for(const ss of db.sessions){for(const en of ss.entries){const b=entryBest(en);
  const had=maxW[en.ex]!=null||maxV[en.ex]!=null;
  if(had){
   if(b.topW!=null&&b.topW>(maxW[en.ex]||0)+0.01)events.push({date:ss.date,ex:en.ex,kind:'gewicht',set:b.bestSet,val:b.topW});
   else if(b.vol&&b.vol>(maxV[en.ex]||0)+0.01)events.push({date:ss.date,ex:en.ex,kind:'volume',val:b.vol});}
  if(b.topW!=null)maxW[en.ex]=Math.max(maxW[en.ex]||0,b.topW);
  if(b.vol)maxV[en.ex]=Math.max(maxV[en.ex]||0,b.vol);}}
 return events.reverse();}

function streakInfo(){
 const act={};
 db.sessions.forEach(s=>{const k=monday(s.date);act[k]=(act[k]||0)+1});
 db.cardio.forEach(c=>{const k=monday(c.d);act[k]=(act[k]||0)+1});
 const thisWk=monday(todayISO());
 let streak=0,w=1;
 while(act[weekKeyOffset(thisWk,w)]){streak++;w++;}
 const thisCount=act[thisWk]||0;
 if(thisCount)streak++;
 return {streak,thisCount,thisWk,act};
}

const AXIS='rgba(14,20,48,.45)';
function niceTicks(min,max,n){
 if(min===max){min-=1;max+=1}
 const span=max-min,step0=span/n,mag=Math.pow(10,Math.floor(Math.log10(step0)));
 const norm=step0/mag;const step=(norm<1.5?1:norm<3?2:norm<7?5:10)*mag;
 const lo=Math.floor(min/step)*step,hi=Math.ceil(max/step)*step;
 const t=[];for(let v=lo;v<=hi+step*0.01;v+=step)t.push(v);return t;}
function smoothPath(pts){
 if(pts.length===1)return '';
 let d='M'+pts[0][0].toFixed(1)+' '+pts[0][1].toFixed(1);
 for(let i=1;i<pts.length;i++){const [x0,y0]=pts[i-1],[x1,y1]=pts[i];const dx=(x1-x0)/2.2;
  d+=' C'+(x0+dx).toFixed(1)+' '+y0.toFixed(1)+' '+(x1-dx).toFixed(1)+' '+y1.toFixed(1)+' '+x1.toFixed(1)+' '+y1.toFixed(1);}
 return d;}

function lineChart(rows,series,opts){
 opts=opts||{};const H=opts.h||180,W=360,pl=42,pr=12,pt=14,pb=24;
 const all=[];rows.forEach(r=>r.v.forEach(v=>{if(v!=null)all.push(v)}));
 if(!all.length)return '<div class="empty">Nog geen data</div>';
 let min=Math.min(...all),max=Math.max(...all);const pad=(max-min)*0.12||max*0.08||1;min-=pad;max+=pad;
 const ticks=niceTicks(min,max,3);min=ticks[0];max=ticks[ticks.length-1];
 const X=i=>rows.length===1?(pl+(W-pl-pr)/2):pl+(W-pl-pr)*i/(rows.length-1);
 const Y=v=>pt+(H-pt-pb)*(1-(v-min)/(max-min));
 let g='';ticks.forEach(t=>{const y=Y(t);g+='<line x1="'+pl+'" y1="'+y.toFixed(1)+'" x2="'+(W-pr)+'" y2="'+y.toFixed(1)+'" stroke="var(--grid)" stroke-width="1"/>'+
  '<text x="'+(pl-7)+'" y="'+(y+3.4).toFixed(1)+'" text-anchor="end" font-family="var(--mono)" font-size="9.5" fill="'+AXIS+'">'+(opts.fmt?opts.fmt(t):nf0.format(t))+'</text>';});

 series.forEach((se,si)=>{
  const pts=[];rows.forEach((r,i)=>{if(r.v[si]!=null)pts.push([X(i),Y(r.v[si]),i])});

   '<path d="'+smoothPath(pts)+' L'+pts[pts.length-1][0].toFixed(1)+' '+(H-pb)+' L'+pts[0][0].toFixed(1)+' '+(H-pb)+' Z" fill="url(#'+gid+')" stroke="none"/>';}
  if(pts.length>1)paths+='<path d="'+smoothPath(pts)+'" fill="none" stroke="'+se.c+'" stroke-width="'+(se.wd||2)+'" stroke-linecap="round"'+(se.dash?' stroke-dasharray="4 4"':'')+'/>';
  pts.forEach((p,pi)=>{const last=pi===pts.length-1;const row=rows[p[2]];
   const tipTxt=row.label+' · '+se.n+': '+(opts.fmt?opts.fmt(row.v[si]):kg(row.v[si]));
   if(!se.noDots){dots+='<circle cx="'+p[0].toFixed(1)+'" cy="'+p[1].toFixed(1)+'" r="'+(last?4.4:2.8)+'" fill="'+se.c+'" stroke="#ffffff" stroke-width="1.6"/>';
    if(last)dots+='<circle cx="'+p[0].toFixed(1)+'" cy="'+p[1].toFixed(1)+'" r="7.6" fill="none" stroke="'+se.c+'" stroke-opacity=".4" stroke-width="1.4"/>';
    if(si===0&&row.pr)dots+='<circle cx="'+p[0].toFixed(1)+'" cy="'+p[1].toFixed(1)+'" r="6.4" fill="none" stroke="#D9A406" stroke-width="1.5"/>';}
   dots+='<circle cx="'+p[0].toFixed(1)+'" cy="'+p[1].toFixed(1)+'" r="13" fill="rgba(0,0,0,0)" data-tip="'+encodeURIComponent(tipTxt)+'"/>';});
 });
 let xl='';const li=rows.length-1;const mids=rows.length>4?[Math.round(li/2)]:[];
 [0,...mids,li].forEach(i=>{
  xl+='<text x="'+X(i).toFixed(1)+'" y="'+(H-7)+'" text-anchor="'+(i===0?'start':i===li?'end':'middle')+'" font-family="var(--mono)" font-size="9.5" fill="'+AXIS+'">'+esc(rows[i].label)+'</text>';});
 return '<svg class="chart" viewBox="0 0 '+W+' '+H+'">'+area+g+paths+dots+xl+'</svg>';}
function barChart(rows,color,opts){

 const vals=rows.map(r=>r.v||0);const max=Math.max(...vals,1);

 let xl='';const li=rows.length-1;
 [0,rows.length>4?Math.round(li/2):null,li].forEach(i=>{if(i==null)return;
  xl+='<text x="'+(pl+avail*i+avail/2).toFixed(1)+'" y="'+(H-6)+'" text-anchor="middle" font-family="var(--mono)" font-size="9.5" fill="'+AXIS+'">'+esc(rows[i].label)+'</text>';});
 return '<svg class="chart" viewBox="0 0 '+W+' '+H+'">'+g+bars+xl+'</svg>';}

 /* weekly volume */

  h+='<div class="card"><div class="row" style="flex-wrap:wrap"><b style="font-size:17px" class="grow">'+esc(ex.name)+'</b>'+(ex.setting?'<span class="setting">'+esc(ex.setting)+'</span>':'')+'</div>';

  const rows=hist.filter(x=>x.vol||x.topW!=null);
  if(rows.length>=2){
   let prevMax=0;const chartRows=rows.map(x=>{const pr=x.topW!=null&&x.topW>prevMax+0.01&&prevMax>0;if(x.topW!=null)prevMax=Math.max(prevMax,x.topW);return {label:dShort(x.date),v:[x.topW],pr};});
   h+='<div style="margin-top:14px">'+lineChart(chartRows,[{n:'top gewicht',c:'#2a78d6'}],{fmt:kg})+legend([{n:'top gewicht (kg)',c:'#2a78d6'},{n:'○ PR',c:'#D9A406'}])+'</div>';
   h+='<div style="margin-top:16px">'+barChart(rows.map(x=>({label:dShort(x.date),v:Math.round(x.vol||0)})),'#2a78d6',{h:110,fmt:v=>nf0.format(v)})+'<div class="legend"><span><span class="ldot" style="background:#2a78d6"></span>volume per sessie (kg)</span></div></div>';
  } else h+='<div class="empty">Nog te weinig data voor een grafiek. Log nog een sessie met deze oefening.</div>';

 if(ctx==='A'&&db.active){if(!db.active.entries.some(e=>e.ex===exId)){const prev=prevEntryFor(exId);db.active.entries.push({ex:exId,sets:Array.from({length:prev?Math.max(prev.sets.length,1):1},newSetRow),note:''});}closeModal();render();}
 else if(ctx==='T'){const t=db.templates.find(x=>x.id===ui.tplEditId);if(t&&!t.exIds.includes(exId))t.exIds.push(exId);closeModal();render();}
 else if(ctx==='P'){ui.progressEx=exId;ui.histAll=false;closeModal();render();}
 else{const ss=db.sessions.find(s=>s.id===ctx);if(ss){if(!ss.entries.some(e=>e.ex===exId))ss.entries.push({ex:exId,sets:[newSetRow()],note:''});closeModal();openSessionDetail(ctx);}else closeModal();}
 save();}
function openExEditor(exId){
 const e=db.exercises[exId];if(!e)return;
 const used=db.sessions.some(s=>s.entries.some(en=>en.ex===exId))||db.templates.some(t=>t.exIds.includes(exId))||(db.active&&db.active.entries.some(en=>en.ex===exId));
 openModal('<div class="mtitle">Oefening</div><div class="msub">Wijzigingen worden direct bewaard</div>'+
  '<div class="field"><label>Naam</label><input type="text" value="'+esc(e.name)+'" data-in="exname" data-id="'+exId+'"></div>'+
  '<div class="field"><label>Stand / instelling (pin, stoel, hoek)</label><input type="text" value="'+esc(e.setting)+'" placeholder="bijv. Pin 19, stoel 6" data-in="exsetting" data-id="'+exId+'"></div>'+
  '<div class="field"><label>Spiergroep</label><select data-in="exgroup" data-id="'+exId+'">'+GROUPS.map(g=>'<option '+(e.group===g?'selected':'')+'>'+g+'</option>').join('')+'</select></div>'+
  (!used?'<button class="btn danger wide" style="margin-top:14px" data-a="exDelete" data-id="'+exId+'">Verwijder oefening</button>':'')+
  '<button class="btn acc wide" style="margin-top:10px" data-a="exEditorDone">Klaar</button>');}
/* ============ body & import ============ */
function bwUpsert(d,w,kcal){
 let row=db.body.find(b=>b.d===d);
 if(!row){row={d,w:null,kcal:null};db.body.push(row);}
 if(w!==undefined&&w!==null)row.w=w;if(kcal!==undefined&&kcal!==null)row.kcal=kcal;
 db.body.sort((a,b)=>a.d<b.d?-1:1);}
function parseImport(text,kind){
 const out=[];const lines=text.split(/\n+/);
 const dateRe=/(\d{4})-(\d{1,2})-(\d{1,2})|(\d{1,2})[-\/](\d{1,2})[-\/](\d{2,4})/;
 for(const line of lines){
  const dm=line.match(dateRe);if(!dm)continue;
  let iso=null;
  if(dm[1])iso=dm[1]+'-'+dm[2].padStart(2,'0')+'-'+dm[3].padStart(2,'0');
  else{let dd=+dm[4],mm=+dm[5],yy=+dm[6];if(yy<100)yy+=2000;if(mm>12&&dd<=12){const t=dd;dd=mm;mm=t}iso=yy+'-'+String(mm).padStart(2,'0')+'-'+String(dd).padStart(2,'0');}
  const rest=line.replace(dm[0],' ');
  const nums=(rest.match(/\d+(?:[.,]\d+)?/g)||[]).map(parseNum).filter(n=>n!=null);
  const lo=kind==='w'?25:600,hi=kind==='w'?300:8000;
  const val=nums.find(n=>n>=lo&&n<=hi);
  if(val!=null)out.push({d:iso,v:kind==='w'?Math.round(val*10)/10:Math.round(val)});}
 const seen={};return out.filter(r=>seen[r.d]?false:(seen[r.d]=1));}
function openImport(kind){
 ui.importKind=kind;ui.importRows=null;
 openModal('<div class="mtitle">'+(kind==='w'?'Gewicht importeren':'Calorieën importeren')+'</div>'+
  '<div class="msub">Plak regels met datum + waarde (CSV uit MacroFactor, Apple Health opdracht, of los getypt)</div>'+
  '<div class="field"><textarea id="importText" placeholder="2026-07-10, 82,4&#10;11-07-2026; 82,1"></textarea></div>'+
  '<div id="importPrev" class="dim" style="font-size:12.5px;margin-top:8px"></div>'+
  '<div class="row" style="margin-top:12px"><button class="btn wide" data-a="importParse">Herken</button><button class="btn acc wide" data-a="importApply">Importeer</button></div>');}
/* ============ export ============ */
function openExport(){
 const json=JSON.stringify(db);
 openModal('<div class="mtitle">Backup</div><div class="msub">Kopieer deze JSON en bewaar hem veilig (Notities, iCloud). Terugzetten kan via "Backup terugzetten".</div>'+
  '<div class="field"><textarea id="exportText" readonly>'+esc(json)+'</textarea></div>'+
  '<button class="btn acc wide" style="margin-top:12px" data-a="copyExport">Kopieer naar klembord</button>');}
/* ============ events ============ */
function getSetCtx(el){
 const ctx=el.dataset.ctx,ei=+el.dataset.e,si=+el.dataset.s;
 const holder=ctx==='A'?db.active:db.sessions.find(s=>s.id===ctx);
 return holder?{holder,ctx,ei,si,entry:holder.entries[ei]}:null;}
document.addEventListener('click',ev=>{
 const el=ev.target.closest('[data-a]');
 const tipEl=ev.target.closest('[data-tip]');
 if(tipEl){const t=$('#tip');t.textContent=decodeURIComponent(tipEl.dataset.tip);
  const r=tipEl.getBoundingClientRect();t.classList.add('show');
  const tx=Math.min(Math.max(8,r.left+r.width/2-60),window.innerWidth-140);
  t.style.left=tx+'px';t.style.top=Math.max(8,r.top-40)+'px';
  clearTimeout(t._h);t._h=setTimeout(()=>t.classList.remove('show'),2200);}
 else $('#tip').classList.remove('show');
 if(!el)return;
 const a=el.dataset.a,id=el.dataset.id;
 switch(a){
  case 'tab':ui.tab=id;ui.histAll=false;render();window.scrollTo(0,0);break;
  case 'dismissTip':db.flags.tipHidden=true;save();render();break;
  case 'startTpl':{const t=db.templates.find(x=>x.id===id);
   if(db.active){confirmBox('Workout loopt nog','Er staat nog een actieve workout open. Vervangen door een nieuwe?','Vervang',()=>{db.active=null;startSession(t);closeModal();},true);}
   else startSession(t);break;}
  case 'startEmpty':if(db.active){toast('Rond eerst je actieve workout af');break}startSession(null);break;
  case 'resume':ui.screen='session';render();window.scrollTo(0,0);break;
  case 'backHome':ui.screen=null;render();window.scrollTo(0,0);break;
  case 'finish':finishSession();break;
  case 'cancelSession':confirmBox('Workout annuleren','Alle ingevulde sets van deze sessie gaan verloren.','Annuleer workout',()=>{db.active=null;save();ui.screen=null;closeModal();render();},true);break;
  case 'toggleDone':{const c=getSetCtx(el);if(!c)break;const s=c.entry.sets[c.si];s.done=!s.done;save();
   if(c.ctx==='A'){render()}else{openSessionDetail(c.ctx)}break;}
  case 'addSet':{const c=getSetCtx(el);if(!c)break;c.entry.sets.push(newSetRow());save();
   c.ctx==='A'?render():openSessionDetail(c.ctx);break;}
  case 'delSet':{const c=getSetCtx(el);if(!c)break;c.entry.sets.splice(c.si,1);if(!c.entry.sets.length)c.entry.sets.push(newSetRow());save();
   c.ctx==='A'?render():openSessionDetail(c.ctx);break;}
  case 'delEntry':{const c=getSetCtx(el);if(!c)break;
   confirmBox('Oefening verwijderen',(db.exercises[c.entry.ex]?.name||'Deze oefening')+' uit deze workout halen?','Verwijder',()=>{c.holder.entries.splice(c.ei,1);save();closeModal();c.ctx==='A'?render():openSessionDetail(c.ctx);},true);break;}
  case 'noteToggle':{const c=getSetCtx(el);if(!c)break;c.entry._noteOpen=!c.entry._noteOpen&&!c.entry.note?true:!c.entry._noteOpen;
   if(c.entry.note)c.entry._noteOpen=true;
   c.ctx==='A'?render():openSessionDetail(c.ctx);break;}
  case 'addExPicker':openPicker(el.dataset.ctx);break;
  case 'pickEx':addExToCtx(id);break;
  case 'pickerNew':{const name=ui.pickerSearch.trim();if(!name)break;
   const nid=uid('x');db.exercises[nid]={name,setting:'',group:'Overig'};save();addExToCtx(nid);toast('Oefening aangemaakt');break;}
  case 'editEx':openExEditor(id);break;
  case 'exDelete':confirmBox('Oefening verwijderen','Deze oefening wordt definitief verwijderd.','Verwijder',()=>{delete db.exercises[id];save();closeModal();render();},true);break;
  case 'exEditorDone':closeModal();render();break;
  case 'openSession':openSessionDetail(id);break;
  case 'detailDone':closeModal();render();break;
  case 'delSession':confirmBox('Sessie verwijderen','Deze workout wordt definitief verwijderd uit je historie.','Verwijder',()=>{db.sessions=db.sessions.filter(s=>s.id!==id);save();closeModal();render();},true);break;
  case 'manualLog':{
   openModal('<div class="mtitle">Achteraf loggen</div><div class="msub">Kies template en datum, vul daarna de sets in</div>'+
    '<div class="field"><label>Datum</label><input type="date" id="manualDate" value="'+todayISO()+'"></div>'+
    '<div class="plist">'+db.templates.map(t=>'<button class="pitem" data-a="mkManual" data-id="'+t.id+'"><span class="gdot '+GRADS[t.grad]+'"></span><b>'+esc(t.name)+'</b></button>').join('')+'</div>');break;}
  case 'mkManual':{const t=db.templates.find(x=>x.id===id);const date=$('#manualDate')?.value||todayISO();
   const ss={id:uid('s'),date,name:t.name,tplId:t.id,dur:null,entries:t.exIds.map(ex=>({ex,sets:[newSetRow()],note:''}))};
   db.sessions.push(ss);sortSessions();save();openSessionDetail(ss.id);break;}
  case 'cardioAdd':openCardioModal(null);break;
  case 'cardEdit':openCardioModal(id);break;
  case 'cardSave':{const min=parseInt0($('#cardMin')?.value);
   if(!min){toast('Vul een duur in minuten in');break}
   const item={id:id||uid('c'),d:$('#cardDate')?.value||todayISO(),type:$('#cardType')?.value||'Anders',min,km:parseNum($('#cardKm')?.value),note:$('#cardNote')?.value||''};
   db.cardio=db.cardio.filter(c=>c.id!==item.id);db.cardio.push(item);
   db.cardio.sort((a,b)=>a.d<b.d?-1:1);save();closeModal();render();toast('Cardio gelogd: '+item.min+' min');break;}
  case 'cardDel':db.cardio=db.cardio.filter(c=>c.id!==id);save();closeModal();render();break;
  case 'tplEdit':ui.tplEditId=id;ui.screen='tplEdit';render();window.scrollTo(0,0);break;
  case 'tplNew':{const nid=uid('t');db.templates.push({id:nid,name:'Nieuwe workout',grad:'post',exIds:[]});save();ui.tplEditId=nid;ui.screen='tplEdit';render();break;}
  case 'tplDone':ui.screen=null;ui.tab='more';save();render();break;
  case 'tplGrad':{const t=db.templates.find(x=>x.id===ui.tplEditId);if(t){t.grad=id;save();render();}break;}
  case 'tplUp':case 'tplDown':{const t=db.templates.find(x=>x.id===ui.tplEditId);if(!t)break;
   const i=+id,j=a==='tplUp'?i-1:i+1;if(j<0||j>=t.exIds.length)break;
   [t.exIds[i],t.exIds[j]]=[t.exIds[j],t.exIds[i]];save();render();break;}
  case 'tplRemove':{const t=db.templates.find(x=>x.id===ui.tplEditId);if(!t)break;t.exIds.splice(+id,1);save();render();break;}
  case 'tplDelete':confirmBox('Template verwijderen','Je historie blijft bestaan; alleen de template verdwijnt.','Verwijder',()=>{db.templates=db.templates.filter(t=>t.id!==ui.tplEditId);save();closeModal();ui.screen=null;ui.tab='more';render();},true);break;
  case 'progressEx':ui.progressEx=id;ui.histAll=false;render();break;
  case 'progressPick':openPicker('P');break;
  case 'histAll':ui.histAll=true;render();break;
  case 'bwAdd':{const v=parseNum($('#bwquick')?.value);if(v==null||v<25||v>300){toast('Vul een gewicht in kg in');break}
   bwUpsert(todayISO(),v);save();render();toast('Gewicht gelogd: '+kg(v)+' kg');break;}
  case 'bwEdit':{const b=db.body.find(x=>x.d===id);if(!b)break;
   openModal('<div class="mtitle">Meting bewerken</div><div class="msub">'+cap(dLong(b.d))+'</div>'+
    '<div class="field"><label>Gewicht (kg)</label><input type="text" inputmode="decimal" value="'+inVal(b.w)+'" data-in="bww" data-id="'+b.d+'"></div>'+
    '<div class="field"><label>Calorieën (kcal)</label><input type="text" inputmode="numeric" value="'+(b.kcal??'')+'" data-in="bwk" data-id="'+b.d+'"></div>'+
    '<button class="btn danger wide" style="margin-top:14px" data-a="bwDel" data-id="'+b.d+'">Verwijder meting</button>'+
    '<button class="btn acc wide" style="margin-top:10px" data-a="detailDone">Klaar</button>');break;}
  case 'bwDel':db.body=db.body.filter(b=>b.d!==id);save();closeModal();render();break;
  case 'importOpen':openImport(id);break;
  case 'importParse':{const rows=parseImport($('#importText')?.value||'',ui.importKind);ui.importRows=rows;
   $('#importPrev').innerHTML=rows.length?'<b class="upA">'+rows.length+' regels herkend</b> · '+dShort(rows[0].d)+' t/m '+dShort(rows[rows.length-1].d)+' · bijv. '+(ui.importKind==='w'?kg(rows[0].v)+' kg':nf0.format(rows[0].v)+' kcal'):'<span class="downA">Geen regels herkend. Check of elke regel een datum en een waarde heeft.</span>';break;}
  case 'importApply':{let rows=ui.importRows;
   if(!rows)rows=parseImport($('#importText')?.value||'',ui.importKind);
   if(!rows.length){toast('Niets om te importeren');break}
   rows.forEach(r=>bwUpsert(r.d,ui.importKind==='w'?r.v:undefined,ui.importKind==='k'?r.v:undefined));
   save();closeModal();render();toast(rows.length+' metingen geïmporteerd');break;}
  case 'exportOpen':openExport();break;
  case 'copyExport':{const txt=$('#exportText')?.value||'';
   if(navigator.clipboard&&navigator.clipboard.writeText)navigator.clipboard.writeText(txt).then(()=>toast('Backup gekopieerd')).catch(()=>{$('#exportText').select();document.execCommand('copy');toast('Backup gekopieerd')});
   else{$('#exportText').select();document.execCommand('copy');toast('Backup gekopieerd')}break;}
  case 'backupImportOpen':openModal('<div class="mtitle">Backup terugzetten</div><div class="msub">Plak hier een eerder gekopieerde backup-JSON. Dit vervangt alle huidige data.</div>'+
   '<div class="field"><textarea id="restoreText"></textarea></div>'+
   '<button class="btn acc wide" style="margin-top:12px" data-a="backupApply">Zet terug</button>');break;
  case 'backupApply':{try{const d=JSON.parse($('#restoreText').value);
    if(!d||!d.sessions||!d.exercises)throw new Error('x');
    confirmBox('Backup terugzetten','Je huidige data wordt vervangen door de backup ('+d.sessions.length+' sessies).','Vervang',()=>{db=migrate(d);save();closeModal();ui={...ui,progressEx:null,screen:null};render();toast('Backup teruggezet');},true);}
   catch(e){toast('Ongeldige backup-JSON')}break;}
  case 'wipe':confirmBox('Alles wissen','Alle workouts, templates en metingen verdwijnen definitief van dit toestel.','Wis alles',()=>{
    confirmBox('Zeker weten?','Dit is niet terug te draaien zonder backup.','Ja, wis alles',()=>{const fresh=seedDB();fresh.sessions=[];db=fresh;save();closeModal();ui.progressEx=null;render();toast('Alles gewist');},true);},true);break;
  case 'confirmYes':{const fn=ui.pendingConfirm;closeModal();if(fn)fn();break;}
  case 'closeModal':closeModal();break;
 }});
document.addEventListener('input',ev=>{
 const el=ev.target.closest('[data-in]');if(!el)return;
 const t=el.dataset.in,id=el.dataset.id;
 if(t==='set'){const c=getSetCtx(el);if(!c)return;const s=c.entry.sets[c.si];const f=el.dataset.f;
  if(f==='w')s.w=parseNum(el.value);else if(f==='r')s.r=parseInt0(el.value);else s.p=parseInt0(el.value)||0;
  if(s.w>0&&s.r>0&&!s.done){s.done=true;const row=el.closest('.setrow');if(row)row.classList.add('done');}
  const cmp=$('#cmp-'+c.ctx+'-'+c.ei+'-'+c.si);if(cmp){const [cc,ca]=cmpArrow(c.entry.ex,c.si,s);cmp.className='cmp '+cc;cmp.textContent=ca;}
  if(c.ctx==='A')patchSessionHeader();save();}
 else if(t==='enote'){const c=getSetCtx(el);if(!c)return;c.entry.note=el.value;save();}
 else if(t==='sdate'){const ss=db.sessions.find(s=>s.id===el.dataset.ctx);if(ss&&el.value){ss.date=el.value;save();}}
 else if(t==='tname'){const tp=db.templates.find(x=>x.id===id);if(tp){tp.name=el.value;save();}}
 else if(t==='exname'){const e=db.exercises[id];if(e){e.name=el.value;save();}}
 else if(t==='exsetting'){const e=db.exercises[id];if(e){e.setting=el.value;save();}}
 else if(t==='exsearch'){ui.exSearch=el.value;
  clearTimeout(ui._exT);ui._exT=setTimeout(()=>{const sc=window.scrollY;render();window.scrollTo(0,sc);
   const inp=$('input[data-in=exsearch]');if(inp){inp.focus();inp.setSelectionRange(inp.value.length,inp.value.length);}},350);}
 else if(t==='picksearch'){ui.pickerSearch=el.value;clearTimeout(ui._pkT);ui._pkT=setTimeout(renderPicker,300);}
 else if(t==='bww'){const b=db.body.find(x=>x.d===id);if(b){b.w=parseNum(el.value);save();}}
 else if(t==='bwk'){const b=db.body.find(x=>x.d===id);if(b){b.kcal=parseInt0(el.value);save();}}
});
document.addEventListener('change',ev=>{
 const el=ev.target.closest('select[data-in=exgroup]');if(!el)return;
 const e=db.exercises[el.dataset.id];if(e){e.group=el.value;save();}});
/* ============ head / pwa ============ */
(function(){
 const mk=(n,c)=>{let m=document.querySelector('meta[name="'+n+'"]');if(!m){m=document.createElement('meta');m.name=n;document.head.appendChild(m)}m.content=c};
 mk('apple-mobile-web-app-capable','yes');mk('mobile-web-app-capable','yes');
 mk('apple-mobile-web-app-status-bar-style','default');
 mk('apple-mobile-web-app-title','Liftlog');mk('theme-color','#F4F6FB');
 let vp=document.querySelector('meta[name=viewport]');
 if(!vp){vp=document.createElement('meta');vp.name='viewport';vp.content='width=device-width, initial-scale=1, viewport-fit=cover';document.head.appendChild(vp);}
 else if(!vp.content.includes('viewport-fit'))vp.content+=', viewport-fit=cover';
 const l=document.createElement('link');l.rel='apple-touch-icon';l.href=ICON;document.head.appendChild(l);
})();
document.addEventListener('visibilitychange',()=>{if(document.hidden)save();else if(!ui.screen&&!$('#modal').classList.contains('open'))render();});
window.addEventListener('pagehide',save);
render();
